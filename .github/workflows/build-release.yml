name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ui/source/package-lock.json

      - name: Install dependencies
        working-directory: ui/source
        run: npm ci

      - name: Build UI
        working-directory: ui/source
        run: npm run build

      - name: Create Release Archive
        run: |
          rm -rf ts-lib
          mkdir -p ts-lib

          # Core files
          cp fxmanifest.lua ts-lib/
          cp import.lua ts-lib/ || cp imports.lua ts-lib/ || true
          cp config.lua ts-lib/ || true

          # Lua folders
          [ -d shared ] && cp -r shared ts-lib/
          [ -d modules ] && cp -r modules ts-lib/
          [ -d bridge ] && cp -r bridge ts-lib/
          [ -d server ] && cp -r server ts-lib/
          [ -d lib ] && cp -r lib ts-lib/

          # Built UI (only the build output)
          mkdir -p ts-lib/ui
          cp -r ui/build ts-lib/ui/

          # Final archive with ts-lib/ as root folder
          zip -r ts-lib.zip ts-lib

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ts-lib.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
