name: Discord Notifications

on:
  push:
    branches:
      - main
      - master
  release:
    types: [published]
  workflow_dispatch:

jobs:
  notify-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Changed Files
        id: files
        run: |
          # Get the list of changed files
          FILES=$(git diff-tree --no-commit-id --name-status -r ${{ github.sha }} | head -n 10)
          if [ $(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | wc -l) -gt 10 ]; then
            FILES="$FILES"$'\n'"... and more files"
          fi
          # Replace newlines with something Discord friendly or handle formatting
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Discord Webhook Action (Push)
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-title: "🔨 New Commit on ts-lib"
          embed-description: |
            A new push has been detected in the **ts-lib** repository.
            
            **Details:**
            - **Author:** ${{ github.actor }}
            - **Branch:** ${{ github.ref_name }}
            - **Commit Message:** ${{ github.event.head_commit.message }}
            - **Link:** ${{ github.event.head_commit.url }}
            
            **Files Changed:**
            ```
            ${{ steps.files.outputs.changed_files }}
            ```
          embed-color: 3447003 # Soft Blue
          username: "TS-Lib Updates"
          avatar-url: "https://raw.githubusercontent.com/toine-scripts/resources/ts-lib/master/ui/src/assets/logo.png"

  notify-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Discord Webhook Action (Release)
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-title: "🚀 New Release: ${{ github.event.release.tag_name }}"
          embed-description: |
            A new version of **ts-lib** has been published!
            
            **Release Details:**
            - **Tag:** ${{ github.event.release.tag_name }}
            - **Name:** ${{ github.event.release.name }}
            - **Author:** ${{ github.actor }}
            - **Changelog:** ${{ github.event.release.html_url }}
          embed-color: 3066993 # Vibrant Green/Cyan
          username: "TS-Lib Releases"
          avatar-url: "https://raw.githubusercontent.com/toine-scripts/resources/ts-lib/master/ui/src/assets/logo.png"

  notify-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Discord Webhook Action (Manual)
        uses: tsickert/discord-webhook@v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-title: "🔄 Manual Workflow Trigger"
          embed-description: |
            The notification workflow was triggered manually by **${{ github.actor }}**.
          embed-color: 15105570 # Orange
          username: "TS-Lib System"
          avatar-url: "https://raw.githubusercontent.com/toine-scripts/resources/ts-lib/master/ui/src/assets/logo.png"
